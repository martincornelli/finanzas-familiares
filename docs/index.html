<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#0b2f2a">
    <title>Finanzas Familiares</title>
    <link rel="icon" type="image/png" href="./assets/app-logo.png">
    <link rel="shortcut icon" type="image/png" href="./assets/app-logo.png">
    <link rel="apple-touch-icon" href="./assets/app-logo.png">
    <link rel="stylesheet" href="./styles.css?v=20260523-2">
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="sidebar" aria-label="Navegacion principal">
        <a id="brand-home" class="brand-block brand-link" href="#summary" aria-label="Ir al resumen del mes actual">
          <img class="brand-mark" src="./assets/app-logo.png" alt="" aria-hidden="true">
          <div>
            <p class="eyebrow">Finanzas</p>
            <h1>Familiares</h1>
          </div>
        </a>
        <div id="family-chip" class="family-chip skeleton">Conectando...</div>
        <nav class="nav-list">
          <button class="nav-item active" data-route="summary" type="button">Inicio</button>
          <button class="nav-item" data-route="expenses" type="button">Gastos</button>
          <button class="nav-item" data-route="donations" type="button">Donativos</button>
          <button class="nav-item" data-route="savings" type="button">Ahorros</button>
          <button class="nav-item" data-route="analysis" type="button">Analisis</button>
          <button class="nav-item" data-route="config" type="button">Config</button>
        </nav>
      </aside>

      <section class="workspace" aria-live="polite">
        <header class="topbar">
          <div class="month-control">
            <button id="month-prev" class="icon-button" type="button" title="Mes anterior">‹</button>
            <button id="month-picker" class="month-title" type="button">Mes actual</button>
            <button id="month-next" class="icon-button" type="button" title="Mes siguiente">›</button>
          </div>
          <div class="topbar-actions">
            <button id="current-month" class="chip-button" type="button">Mes Actual</button>
            <button id="generate-month" class="chip-button" type="button">Agregar Meses</button>
            <button id="delete-months" class="chip-button danger-chip" type="button">Eliminar Meses</button>
          </div>
        </header>
        <main id="screen" class="screen">
          <div class="loading-panel">
            <div class="spinner"></div>
            <span>Cargando datos...</span>
          </div>
        </main>
      </section>
    </div>

    <dialog id="modal" class="modal"></dialog>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script type="module" src="./app.js?v=20260523-2"></script>
  </body>
</html>
